{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="mb-3">Đăng nhập</h4>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark w-100" type="submit">Đăng nhập</button>
                </form>

                <div class="small mt-3">
                    Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
