{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="fw-bold text-center mb-2">
                        <i class="bi bi-box-arrow-in-right text-primary"></i> Đăng nhập
                    </h2>

                    <p class="text-muted text-center mb-4">
                        Đăng nhập để sử dụng hệ thống
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}

                        <button class="btn btn-main w-100 py-2" type="submit">
                            Đăng nhập
                        </button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        Chưa có tài khoản?
                        <a href="{% url 'register' %}" class="fw-bold">Đăng ký ngay</a>
                    </p>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
