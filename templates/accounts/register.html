{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="fw-bold text-center mb-2">
                        <i class="bi bi-person-plus text-warning"></i> Đăng ký tài khoản
                    </h2>

                    <p class="text-muted text-center mb-4">
                        Tạo tài khoản để đặt hàng và theo dõi đơn hàng
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên đăng nhập</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            {{ form.password1 }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nhập lại mật khẩu</label>
                            {{ form.password2 }}
                        </div>

                        {% if form.errors %}
                        <div class="alert alert-danger">
                            {{ form.errors }}
                        </div>
                        {% endif %}

                        <button class="btn btn-warning w-100 fw-bold py-2" type="submit">
                            Đăng ký
                        </button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        Đã có tài khoản?
                        <a href="{% url 'login' %}" class="fw-bold">Đăng nhập</a>
                    </p>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
