{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="mb-3">{{ title }}</h4>
                <p>Bạn chắc chắn muốn xóa: <b>{{ obj }}</b> ?</p>

                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Xóa</button>
                    <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
