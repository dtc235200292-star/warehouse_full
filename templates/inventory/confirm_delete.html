{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <i class="bi bi-exclamation-triangle-fill text-danger display-4"></i>

                    <h3 class="fw-bold mt-3">{{ title }}</h3>

                    <p class="text-muted">
                        Bạn có chắc chắn muốn xóa mục này không?
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <button class="btn btn-danger px-4" type="submit">
                            Xóa
                        </button>

                        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4">
                            Hủy
                        </a>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
