{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="mb-3">{{ title }}</h4>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2">
                        <button class="btn btn-dark" type="submit">Lưu</button>
                        <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Quay lại</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
